<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deadline Apocalypse</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f1117;
color:white;
}

.hero{
height:100vh;
background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url("https://images.unsplash.com/photo-1523050854058-8df90110c9f1?w=1200");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:55px;
color:#ff4d4d;
}

.hero p{
margin-top:15px;
font-size:22px;
}

.scroll{
margin-top:30px;
font-size:18px;
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:.3;}
}
</style>
</head>

<body>

<section class="hero">
<div>
<h1>DEADLINE APOCALYPSE</h1>
<p>Welcome to the War Called Campus Life</p>
<p class="scroll">⬇ Scroll Down ⬇</p>
</div>
</section>

</body>
</html>
